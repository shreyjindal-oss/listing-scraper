# Render Blueprint — deploys the Scrapling stealth scraper service.
# In the Render dashboard: New + → Blueprint → connect this repo.
services:
  - type: web
    name: listing-scraper-stealth
    runtime: docker
    plan: standard          # 2 GB RAM — required for the headless stealth browser
    region: frankfurt       # closest to India among Render regions; or "singapore"
    healthCheckPath: /api/health
    envVars:
      - key: API_KEY
        sync: false         # you'll be prompted to enter the value in the dashboard
      - key: SENDGRID_API_KEY
        sync: false         # optional — enables failure alert emails, see DEPLOY_GCP.md
      - key: ALERT_EMAIL_TO
        value: shrey.jindal@thesqua.re
      - key: ALERT_EMAIL_FROM
        value: noreply@thesqua.re
